<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
       body {
    display: grid;
    place-items: center;
    min-height: 100vh;
}
article {
    margin: 5px auto;
    transition: all 0.4s ease;
    position: relative;  /* Remove absolute */
}
       footer{
        background-color: rgb(233, 230, 230);
        position: absolute;
        width: 100%;
        bottom: 0px;
        left:0% 
       }
       #insta{
        margin-left: 50px;
        height: 50px;
        position: relative;
        bottom: 15px;
        }
        #my{
            height: 500px;
            width: auto;
        }
        
        article img:first-child{
            width: 100%;
            box-shadow: 20px 20px 25px 1px  rgb(219, 183, 183);
            border-radius: 10px;
            object-fit: cover;
            transition: all 0.4s ease;
        }
        article img:last-child{
            position: absolute;
            width: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
        }
        article:hover::before{opacity: 1;}
        article:hover img:last-child{
            opacity: 1;
            transform: translate(-50%, calc(-50% + 10px));
        }
        #c{
            font-family: cursive;
            margin-left: 5%;
        }
        #e{
            font-family: cursive;
            margin-top: 50%;
            position: relative;
            text-align: center;
            left: 0;
        }
    </style>    
</head>
<body>
    <article>
        <p id="e">Hover and click here</p>
         <a href="https://www.instagram.com/ritik_11_29/"><img id="my" src="myimage.png" alt=""></a>
    </article>
    <footer>
        <div>
            <p id="c">Or click here </p>
            <a href="https://www.instagram.com/ritik_11_29/"><img id="insta" src="Instagram.png" alt=""></a>
        </div>
    </footer>
</body>
</html>
